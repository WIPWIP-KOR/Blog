{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    {{ with .Params.categories }}
    <span class="post-categories">
      {{ range . }}<a class="post-category" href="{{ (urlize (printf "/categories/%s/" .)) | relURL }}">{{ . }}</a>{{ end }}
    </span>
    {{ end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
